name: Deploy SAP Platform

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - uat
          - prod
      branch:
        description: "Git branch to build and deploy (leave empty to use the branch selected in Run workflow)"
        required: false
        type: string
        default: ""

jobs:
  build-and-deploy:
    runs-on: docker
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Prepare workspace
        run: |
          if [ -d "$GITHUB_WORKSPACE" ]; then
            sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE" || true
            sudo rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/..?* 2>/dev/null || true
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Set deployment variables
        run: |
          REGISTRY="${{ secrets.DOCKER_REGISTRY }}"
          if [ -z "$REGISTRY" ]; then REGISTRY="ayushaher118"; fi

          ENV="${{ github.event.inputs.environment }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="${ENV}"
          SHA_TAG="${ENV}-${SHORT_SHA}"

          echo "REGISTRY=${REGISTRY}" >> "$GITHUB_ENV"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"
          echo "SHA_TAG=${SHA_TAG}" >> "$GITHUB_ENV"
          echo "ENV=${ENV}" >> "$GITHUB_ENV"
          echo "API_IMAGE=${REGISTRY}/sap-api:${TAG}" >> "$GITHUB_ENV"
          echo "UI_IMAGE=${REGISTRY}/sap-ui:${TAG}" >> "$GITHUB_ENV"
          echo "DEPLOY_DIR=/home/ayush/services/sap-platform" >> "$GITHUB_ENV"
          echo "COMPOSE_FILE=/home/ayush/services/sap-platform/docker-compose.${ENV}.yml" >> "$GITHUB_ENV"
          echo "STACK_NAME=sap-platform-${ENV}" >> "$GITHUB_ENV"

          if [ "$ENV" = "uat" ]; then
            echo "UI_PORT=8082" >> "$GITHUB_ENV"
          else
            echo "UI_PORT=8080" >> "$GITHUB_ENV"
          fi

      - name: Test API
        run: |
          sudo docker run --rm \
            -u "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -v "$GITHUB_WORKSPACE:/src" \
            -w /src \
            mcr.microsoft.com/dotnet/sdk:10.0 \
            dotnet test SapApi/tests/SapApi.Tests/SapApi.Tests.csproj -c Debug

      - name: Prepare API RSA keys
        run: |
          KEYS_DIR="SapApi/src/SapApi.Api/Keys"
          mkdir -p "${KEYS_DIR}"
          cp sap-ui/src/config/keys/public.pem "${KEYS_DIR}/public.pem"

          if [ -n "${{ secrets.RSA_PRIVATE_KEY }}" ]; then
            printf '%s\n' "${{ secrets.RSA_PRIVATE_KEY }}" > "${KEYS_DIR}/private.pem"
          elif [ -f "${DEPLOY_DIR}/keys/private.pem" ]; then
            cp "${DEPLOY_DIR}/keys/private.pem" "${KEYS_DIR}/private.pem"
          else
            echo "::warning::RSA private key not found (RSA_PRIVATE_KEY secret or ${DEPLOY_DIR}/keys/private.pem). Encrypted login will not work."
          fi
          chmod 600 "${KEYS_DIR}/private.pem" 2>/dev/null || true

      - name: Build and push API image
        run: |
          sudo docker build . \
            --file ./SapApi/Dockerfile \
            --tag "${API_IMAGE}" \
            --tag "${REGISTRY}/sap-api:${SHA_TAG}"

          sudo docker push "${API_IMAGE}"
          sudo docker push "${REGISTRY}/sap-api:${SHA_TAG}"

          if [ "$ENV" = "prod" ]; then
            sudo docker tag "${API_IMAGE}" "${REGISTRY}/sap-api:latest"
            sudo docker push "${REGISTRY}/sap-api:latest"
          fi

      - name: Build and push UI image
        working-directory: sap-ui
        run: |
          sudo docker build . \
            --build-arg VITE_API_BASE_URL=/api \
            --tag "${UI_IMAGE}" \
            --tag "${REGISTRY}/sap-ui:${SHA_TAG}"

          sudo docker push "${UI_IMAGE}"
          sudo docker push "${REGISTRY}/sap-ui:${SHA_TAG}"

          if [ "$ENV" = "prod" ]; then
            sudo docker tag "${UI_IMAGE}" "${REGISTRY}/sap-ui:latest"
            sudo docker push "${REGISTRY}/sap-ui:latest"
          fi

      - name: Sync compose file to host
        run: |
          sudo mkdir -p "${DEPLOY_DIR}"
          sudo cp "docker-compose.${ENV}.yml" "${COMPOSE_FILE}"
          sudo cp deploy.env.example "${DEPLOY_DIR}/.env.${ENV}.example"

      - name: Validate host environment file
        run: |
          ENV_FILE="${DEPLOY_DIR}/.env.${ENV}"
          if [ ! -f "$ENV_FILE" ]; then
            ENV_FILE="${DEPLOY_DIR}/.env"
          fi
          if [ ! -f "$ENV_FILE" ]; then
            echo "::error::Missing host env file. Create ${DEPLOY_DIR}/.env.${ENV} from ${DEPLOY_DIR}/.env.${ENV}.example"
            echo "See deploy.env.example in the repo for the required checklist."
            exit 1
          fi

          set -a
          # shellcheck disable=SC1090
          source "$ENV_FILE"
          set +a

          MISSING=()
          for var in DB_CONNECTION SAP_SERVICE_LAYER_URL SAP_USERNAME SAP_COMPANY_DB HMAC_SECRET JWT_SECRET_KEY CORS_ORIGIN; do
            if [ -z "${!var:-}" ]; then
              MISSING+=("$var")
            fi
          done

          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "::error::Host env file ${ENV_FILE} is missing required values:"
            printf '  - %s\n' "${MISSING[@]}"
            echo "Copy ${DEPLOY_DIR}/.env.${ENV}.example, fill in secrets, and redeploy."
            exit 1
          fi

          echo "ENV_FILE=${ENV_FILE}" >> "$GITHUB_ENV"
          echo "Host environment file validated: ${ENV_FILE}"

      - name: Deploy stack
        run: |
          set -a
          # shellcheck disable=SC1090
          source "${ENV_FILE}"
          set +a

          export TAG DOCKER_REGISTRY="${REGISTRY}"

          sudo -E docker stack deploy "${STACK_NAME}" \
            --compose-file "${COMPOSE_FILE}" \
            --with-registry-auth

      - name: Verify deployment health
        run: |
          echo "Waiting for services to become healthy..."
          sleep 30

          for i in $(seq 1 18); do
            if curl -fsS "http://localhost:${UI_PORT}/" > /dev/null; then
              echo "UI is healthy on port ${UI_PORT}"
              sudo docker service ls --filter "label=com.docker.stack.namespace=${STACK_NAME}"
              exit 0
            fi
            echo "Attempt ${i}/18: UI not ready yet..."
            sleep 10
          done

          echo "UI health check failed on port ${UI_PORT}"
          sudo docker service ls
          echo "--- sap-api tasks ---"
          sudo docker service ps --no-trunc "${STACK_NAME}_sap-api" || true
          echo "--- sap-ui tasks ---"
          sudo docker service ps --no-trunc "${STACK_NAME}_sap-ui" || true
          exit 1
