image: atlassian/default-image:4
runs-on: 
  - 'self.hosted'
  - 'pbbpl'

options:
  docker: true

definitions:
  services:
    docker:
      memory: 3072

  steps:
    - step: &build-test
        name: Build & Test
        services:
          - docker
        script:
          - chmod +x scripts/*.sh

          # Run Tests
          - docker run --rm \
              -v $(pwd):/src \
              -w /src \
              mcr.microsoft.com/dotnet/sdk:10.0 \
              dotnet test SapApi/tests/SapApi.Tests/SapApi.Tests.csproj

          # Docker Login
          - echo "$DOCKER_PASSWORD" | docker login \
              -u "$DOCKER_USERNAME" \
              --password-stdin

    - step: &deploy-uat
        name: Deploy UAT
        deployment: test
        services:
          - docker
        script:
          - export TAG=uat
          - export SHORT_SHA=$(echo $BITBUCKET_COMMIT | cut -c1-7)

          # Build Images
          - docker build -f SapApi/Dockerfile \
              -t ${DOCKER_REGISTRY}/sap-api:${TAG} .

          - docker build sap-ui \
              -t ${DOCKER_REGISTRY}/sap-ui:${TAG}

          # Push
          - docker push ${DOCKER_REGISTRY}/sap-api:${TAG}
          - docker push ${DOCKER_REGISTRY}/sap-ui:${TAG}

          # Deploy
          - docker stack deploy \
              --compose-file docker-compose.uat.yml \
              sap-platform-uat \
              --with-registry-auth

    - step: &deploy-prod
        name: Deploy Production
        deployment: production
        services:
          - docker
        script:
          - export TAG=prod
          - export SHORT_SHA=$(echo $BITBUCKET_COMMIT | cut -c1-7)

          # Build Images
          - docker build -f SapApi/Dockerfile \
              -t ${DOCKER_REGISTRY}/sap-api:${TAG} .

          - docker build sap-ui \
              -t ${DOCKER_REGISTRY}/sap-ui:${TAG}

          # Push
          - docker push ${DOCKER_REGISTRY}/sap-api:${TAG}
          - docker push ${DOCKER_REGISTRY}/sap-ui:${TAG}

          # Latest tags
          - docker tag ${DOCKER_REGISTRY}/sap-api:${TAG} \
              ${DOCKER_REGISTRY}/sap-api:latest
          - docker tag ${DOCKER_REGISTRY}/sap-ui:${TAG} \
              ${DOCKER_REGISTRY}/sap-ui:latest

          - docker push ${DOCKER_REGISTRY}/sap-api:latest
          - docker push ${DOCKER_REGISTRY}/sap-ui:latest

          # Deploy
          - docker stack deploy \
              --compose-file docker-compose.prod.yml \
              sap-platform-prod \
              --with-registry-auth

pipelines:
  branches:

    dev:
      - stage:
          name: UAT Pipeline
          deployment: test
          steps:
            - step: *build-test
            - step: *deploy-uat

    main:
      - stage:
          name: Production Pipeline
          deployment: production
          steps:
            - step: *build-test
            - step: *deploy-prod